<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}{{ app_title }}{% endblock %}</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}" />
    {% block head %}{% endblock %}
  </head>
  <body>
    {% if session.get("logged_in") %}
    <header class="navbar-custom">
      <div class="brand">{{ app_title }}</div>
      <nav class="menu">
        <a class="nav-icon-link" href="{{ url_for('index') }}">
          <i class="fas fa-gauge-high me-1"></i><span class="fastag-menu-label">Dashboard</span>
        </a>
        <a class="nav-icon-link" href="{{ url_for('incoming_requests') }}">
          <i class="fas fa-arrow-down-wide-short me-1"></i><span class="fastag-menu-label">Incoming Data</span>
        </a>
        <a class="nav-icon-link" href="{{ url_for('cgp_records') }}">
          <i class="fas fa-file-invoice me-1"></i><span class="fastag-menu-label">CGP Data</span>
        </a>
        <a class="nav-icon-link" href="#api-help">
          <i class="fas fa-plug me-1"></i><span class="fastag-menu-label">API</span>
        </a>
        <a class="nav-icon-link" href="{{ url_for('logout') }}">
          <i class="fas fa-right-from-bracket me-1"></i><span class="fastag-menu-label">Logout</span>
        </a>
      </nav>
    </header>
    {% endif %}
    <main class="page-wrapper">{% block content %}{% endblock %}</main>
    <footer class="app-footer">Powered by Bloom Electronics Pvt Ltd</footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
